<!DOCTYPE html>
<html lang="et">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MM 2026 – Ennustus</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d1117;--bg2:#161b22;--bg3:#1e2631;--border:#30363d;
  --green:#238636;--green2:#2ea043;--green3:#3fb950;--green4:#0d2818;
  --gold:#d29922;--goldbg:#1a1500;
  --text:#c9d1d9;--text2:#8b949e;
  --red:#da3633;--redbg:#2a0d0d;
  --blue:#388bfd;--r:8px;
  --yellow:#e3b341;--yellowbg:#2a1f00;
}
/* LIGHT THEME */
body.light{
  --bg:#f6f8fa;--bg2:#ffffff;--bg3:#eaeef2;--border:#d0d7de;
  --green:#1a7f37;--green2:#1f883d;--green3:#1a7f37;--green4:#dafbe1;
  --gold:#9a6700;--goldbg:#fff8c5;
  --text:#1f2328;--text2:#59636e;
  --red:#cf222e;--redbg:#ffebe9;
  --blue:#0969da;
  --yellow:#9a6700;--yellowbg:#fff8c5;
}
body{transition:background-color .2s,color .2s}
body.light .login-box h1{background:linear-gradient(135deg,#1f2328 0%,#59636e 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
body.light .mteam.bold{color:#1f2328}
body.light .p1{background:#dafbe1}
body.light .p2{background:#ddf4ff}
body.light .rank-2{background:#eaeef2}
body.light .rank-3{background:#fff4e0}
body.light .sched-match.live{background:#ffebe9}
body.light .final-label{background:linear-gradient(90deg,#fff8c5,#fff4d6)}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px}

/* LOGIN */
#login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.login-box{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:36px 32px;max-width:430px;width:100%;text-align:center}
.login-ball{font-size:52px;margin-bottom:12px}
.login-box h1{font-size:26px;font-weight:800;letter-spacing:-0.5px;background:linear-gradient(135deg,#fff 0%,#8b949e 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.login-box h2{font-size:13px;color:var(--text2);margin-bottom:20px;font-weight:400}
.cdown-box{border-radius:var(--r);padding:10px 14px;margin-bottom:20px;font-size:13px}
.cdown-open{background:var(--green4);border:1px solid var(--green);color:var(--green3)}
.cdown-locked{background:var(--redbg);border:1px solid var(--red);color:#f85149}
.player-list{display:flex;flex-direction:column;gap:6px;margin-bottom:16px;text-align:left}
.player-item{display:flex;align-items:center;gap:10px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:10px 12px;cursor:pointer;transition:all .15s}
.player-item:hover{border-color:var(--green);background:var(--green4)}
.avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;flex-shrink:0}
.p-name{font-weight:500;flex:1}
.p-prog{font-size:11px;color:var(--text2)}
.p-done{font-size:11px;color:var(--green3)}
.divider{display:flex;align-items:center;gap:10px;margin:14px 0;color:var(--text2);font-size:12px}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border)}
.row{display:flex;gap:8px}
input.text{flex:1;background:var(--bg);border:1px solid var(--border);border-radius:var(--r);padding:9px 12px;color:var(--text);font-size:14px;outline:none;transition:border-color .15s}
input.text:focus{border-color:var(--green)}
.btn{padding:9px 16px;border-radius:var(--r);border:none;cursor:pointer;font-size:14px;font-weight:500;transition:all .15s}
.btn-g{background:var(--green);color:#fff}.btn-g:hover{background:var(--green2)}
.btn-s{background:var(--bg3);color:var(--text);border:1px solid var(--border)}.btn-s:hover{border-color:var(--text2)}
.btn-sm{padding:5px 10px;font-size:12px}
.btn-blue{background:var(--blue);color:#fff}.btn-blue:hover{opacity:.85}
.btn-blue:disabled{opacity:.5;cursor:not-allowed}

/* APP */
#app-screen{display:none}
header{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 16px;display:flex;align-items:center;gap:12px;height:50px;position:sticky;top:0;z-index:100}
.logo{font-size:16px;font-weight:800;white-space:nowrap}
nav{display:flex;gap:2px;flex:1}
.nb{background:none;border:none;color:var(--text2);padding:6px 10px;border-radius:6px;cursor:pointer;font-size:13px;font-weight:500;transition:all .15s;white-space:nowrap;position:relative}
.nb:hover{background:var(--bg3);color:var(--text)}
.nb.active{background:var(--bg3);color:var(--text)}
.nb .bdg{position:absolute;top:2px;right:1px;background:var(--red);color:#fff;border-radius:8px;font-size:9px;font-weight:700;padding:1px 4px;line-height:1.4;display:none}
.header-r{display:flex;align-items:center;gap:8px;white-space:nowrap}
.chip{background:var(--green);color:#fff;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:600}
.lock-badge{background:var(--red);color:#fff;padding:2px 7px;border-radius:20px;font-size:11px;font-weight:600;display:none}
/* HAMBURGER (mobile menu toggle) */
.hamburger{display:none;flex-direction:column;justify-content:center;gap:4px;width:40px;height:34px;background:var(--bg3);border:1px solid var(--border);border-radius:6px;cursor:pointer;padding:0;flex-shrink:0}
.hamburger span{display:block;width:18px;height:2px;background:var(--text);border-radius:2px;margin:0 auto;transition:transform .2s,opacity .2s}
.hamburger.open span:nth-child(1){transform:translateY(6px) rotate(45deg)}
.hamburger.open span:nth-child(2){opacity:0}
.hamburger.open span:nth-child(3){transform:translateY(-6px) rotate(-45deg)}

/* PROGRESS */
.prog-wrap{background:var(--bg3);border-bottom:1px solid var(--border);padding:6px 16px;display:flex;align-items:center;gap:12px}
.prog-lbl{font-size:11px;color:var(--text2);white-space:nowrap}
.prog-track{flex:1;height:5px;background:var(--border);border-radius:3px;overflow:hidden}
.prog-fill{height:100%;background:var(--green);border-radius:3px;transition:width .3s}
.prog-pct{font-size:11px;color:var(--green3);white-space:nowrap;font-weight:600;min-width:32px;text-align:right}

/* TABS */
.tab{display:none;padding:16px;max-width:1120px;margin:0 auto}
.tab.active{display:block}

/* GROUP CARDS */
.groups-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:14px}
.gcard{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
.ghead{background:var(--bg3);padding:9px 12px;display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--border)}
.gletter{font-size:17px;font-weight:800;color:var(--gold)}
.gteams-list{font-size:11px;color:var(--text2);flex:1}
.g-check{color:var(--green3);font-size:13px}
.gmatches{padding:8px;display:flex;flex-direction:column;gap:2px}
.mrow{display:flex;align-items:center;gap:0;padding:4px 4px;border-radius:6px}
.mteam{font-size:12px;font-weight:500;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;padding:0 4px}
.mteam.home{text-align:right}
.mteam.away{text-align:left}
.mteam.bold{font-weight:700;color:#fff}
/* W / T / L buttons */
.wdl{display:flex;gap:3px;flex-shrink:0}
.wb{width:28px;height:26px;border:1px solid var(--border);border-radius:4px;background:var(--bg);color:var(--text2);font-size:10px;font-weight:700;cursor:pointer;transition:all .12s;display:flex;align-items:center;justify-content:center}
.wb:hover:not([disabled]){border-color:var(--text2);color:var(--text)}
.wb[disabled]{cursor:not-allowed;opacity:.5}
.wb.sel-w{background:var(--green4);border-color:var(--green);color:var(--green3)}
.wb.sel-t{background:var(--yellowbg);border-color:var(--yellow);color:var(--yellow)}
.wb.sel-l{background:var(--redbg);border-color:var(--red);color:#f85149}
/* result dot */
.res-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin:0 2px}
.res-dot.ok{background:var(--green3)}
.res-dot.wrong{background:var(--red)}
.res-dot.none{background:var(--border)}

/* STANDINGS */
.standing{border-top:1px solid var(--border);padding:6px 10px}
.srow{display:grid;grid-template-columns:18px 1fr 20px 20px 20px 26px;gap:3px;align-items:center;padding:2px 0;font-size:11px}
.srow.sh{color:var(--text2);font-size:10px}
.pbadge{width:16px;height:16px;border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700}
.p1{background:#1a3a2a;color:var(--green3)}.p2{background:#1a2a3a;color:var(--blue)}
.p3{background:transparent;color:var(--text2)}.p4{background:transparent;color:#444}
.spts{font-weight:700;text-align:right}
.sdim{color:var(--text2);text-align:center;font-size:10px}

/* KNOCKOUT */
.ko-nav{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap}
.knb{background:var(--bg2);border:1px solid var(--border);color:var(--text2);padding:6px 14px;border-radius:20px;cursor:pointer;font-size:12px;font-weight:500;transition:all .15s;display:flex;align-items:center;gap:5px}
.knb:hover{border-color:var(--text2);color:var(--text)}
.knb.active{border-color:var(--green);color:var(--green3);background:var(--green4)}
.knb .kc{color:var(--green3);font-size:11px}
.kround{display:none}
.kround.active{display:block}
.ko-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:10px}
.komatch{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
.komlabel{background:var(--bg3);padding:5px 10px;font-size:10px;color:var(--text2);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.koteam{display:flex;align-items:center;gap:8px;padding:11px 12px;cursor:pointer;transition:background .1s;border:none;background:transparent;color:var(--text);width:100%;text-align:left;font-size:13px;font-weight:500}
.koteam:hover:not([disabled]){background:var(--bg3)}
.koteam[disabled]{cursor:default}
.koteam.winner{background:var(--green4);color:var(--green3)}
.koteam.loser{opacity:.38}
.koteam.tbd{color:var(--text2);font-style:italic;cursor:default;font-size:12px}
.koteam.gold-win{background:var(--goldbg);color:var(--gold)}
.kodivider{height:1px;background:var(--border)}
.ko-info{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:10px 14px;margin-bottom:12px;font-size:12px;color:var(--text2)}
.ko-info strong{color:var(--yellow)}
.pts-badge{font-size:10px;font-weight:700;padding:2px 6px;border-radius:10px}
.pts-ok{background:var(--green4);color:var(--green3);border:1px solid var(--green)}
.pts-none{background:var(--bg);color:var(--text2);border:1px solid var(--border)}

/* 3RD PLACE PICKS */
.tpsect{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:14px;margin-bottom:14px}
.tpsect h3{margin-bottom:6px;font-size:14px}
.tpnote{font-size:11px;color:var(--text2);margin-bottom:10px;line-height:1.5}
.tpgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(175px,1fr));gap:6px}
.tpbtn{display:flex;align-items:center;gap:6px;padding:7px 10px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);cursor:pointer;transition:all .15s;color:var(--text);font-size:12px;width:100%;text-align:left}
.tpbtn:hover:not(.no-pick){border-color:var(--text2)}
.tpbtn.sel{border-color:var(--green);background:var(--green4);color:var(--green3)}
.tpbtn.no-pick{opacity:.4;cursor:default}
.pcnt{background:var(--green);color:#fff;border-radius:10px;padding:1px 6px;font-size:10px;font-weight:700;margin-left:6px}

/* FINAL */
.final-box{max-width:480px;margin:0 auto}
.final-card{background:var(--bg2);border:2px solid var(--gold);border-radius:10px;overflow:hidden}
.final-label{background:linear-gradient(90deg,#2a1f00,#1a1500);padding:8px 14px;font-size:12px;color:var(--gold);font-weight:600;border-bottom:1px solid #3a2a00}

/* SCORE TAB */
.lb-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px}
.pcard{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;cursor:pointer;transition:border-color .15s}
.pcard:hover{border-color:var(--text2)}
.pcard.me{border-color:var(--green)}
.pcard.p-1st{border-color:var(--gold)}
.pcard.p-2nd{border-color:#9e9e9e}
.pcard.p-3rd{border-color:#cd7f32}
.pcard-top{display:flex;align-items:center;gap:10px;padding:12px;border-bottom:1px solid var(--border)}
.rank-badge{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:800;flex-shrink:0}
.rank-1{background:var(--goldbg);color:var(--gold);border:2px solid var(--gold)}
.rank-2{background:#1e1e1e;color:#9e9e9e;border:2px solid #9e9e9e}
.rank-3{background:#1e1500;color:#cd7f32;border:2px solid #cd7f32}
.rank-n{background:var(--bg3);color:var(--text2);border:2px solid var(--border);font-size:13px}
.pcard-prog{height:3px;background:var(--border)}
.pcard-prog-fill{height:100%;background:var(--green)}
.pcard-body{padding:12px}
.score-big{font-size:28px;font-weight:800;color:var(--gold);line-height:1}
.score-breakdown{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-top:10px}
.sb-item{text-align:center;background:var(--bg3);border-radius:6px;padding:6px 4px}
.sb-val{font-size:13px;font-weight:700}
.sb-lbl{font-size:9px;color:var(--text2);margin-top:1px}
.no-act-note{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:12px 16px;color:var(--text2);font-size:13px;margin-bottom:16px;text-align:center}

/* RESULTS TAB */
.results-section{margin-bottom:20px}
.results-section h3{font-size:15px;margin-bottom:10px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.rtag{background:var(--redbg);border:1px solid var(--red);color:#f85149;border-radius:4px;padding:2px 8px;font-size:11px;font-weight:600}
/* auto-fetch bar */
.fetch-bar{display:flex;align-items:center;gap:10px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:12px 16px;margin-bottom:16px;flex-wrap:wrap}
.fetch-bar p{font-size:12px;color:var(--text2);flex:1;min-width:200px}
.fetch-status{font-size:12px;font-weight:500;min-width:200px}
.fetch-status.ok{color:var(--green3)}
.fetch-status.err{color:var(--red)}
.fetch-status.info{color:var(--text2)}
/* actual ko */
.actual-ko-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:10px}
.actual-match{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:12px}
.actual-match label{font-size:11px;color:var(--text2);display:block;margin-bottom:6px}
.actual-match select{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:13px;padding:7px 10px;outline:none;cursor:pointer}
.actual-match select:focus{border-color:var(--green)}

/* SCHEDULE */
.sched-day{margin-bottom:20px}
.sched-day-hdr{font-size:13px;font-weight:700;color:var(--text2);padding:6px 0;border-bottom:1px solid var(--border);margin-bottom:8px;display:flex;align-items:center;gap:8px}
.sched-day-hdr span{font-size:11px;background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:2px 8px;color:var(--text2)}
.sched-match{display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);margin-bottom:5px}
.sched-match.live{border-color:var(--red);background:#1a0808}
.sched-match.finished{border-color:#222d22}
.sched-time{font-size:12px;font-weight:700;color:var(--text2);min-width:40px;text-align:right;flex-shrink:0}
.sched-time.live-t{color:#f85149;animation:tblink 1.2s infinite}
@keyframes tblink{0%,100%{opacity:1}50%{opacity:.4}}
.sched-teams{flex:1;display:flex;align-items:center;gap:6px;min-width:0}
.sched-team{font-size:13px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
.sched-team.home{text-align:right}
.sched-score{font-size:15px;font-weight:800;min-width:54px;text-align:center;flex-shrink:0;background:var(--bg3);border-radius:5px;padding:3px 8px;color:var(--text2)}
.sched-score.has-score{color:var(--gold)}
.sched-score.live-s{color:#f85149}
.sched-grp{font-size:10px;color:var(--text2);min-width:22px;text-align:center;flex-shrink:0}
.sched-wtl{font-size:10px;font-weight:700;padding:2px 5px;border-radius:4px;flex-shrink:0;min-width:20px;text-align:center}
.sched-wtl.W{background:var(--green4);color:var(--green3);border:1px solid var(--green)}
.sched-wtl.T{background:var(--yellowbg);color:var(--yellow);border:1px solid var(--yellow)}
.sched-wtl.L{background:var(--redbg);color:#f85149;border:1px solid var(--red)}
.sched-pred-btn{background:none;border:1px solid var(--border);border-radius:4px;color:var(--text2);cursor:pointer;font-size:12px;padding:3px 6px;flex-shrink:0;line-height:1}
.sched-pred-btn:hover{border-color:var(--text2);color:var(--text)}
.sched-verdict{font-size:11px;font-weight:700;flex-shrink:0;letter-spacing:.3px}
.sched-verdict.ok{color:var(--green3)}
.sched-verdict.no{color:#f85149}
.btn-fetch-off{background:var(--bg3)!important;color:var(--text2)!important;border:1px solid var(--border)!important;cursor:not-allowed!important;opacity:.55}
.btn-fetch-on{background:var(--red)!important;color:#fff!important;border:none!important;cursor:pointer!important;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(218,54,51,.4)}70%{box-shadow:0 0 0 6px rgba(218,54,51,0)}}

/* MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;display:none;align-items:center;justify-content:center;padding:16px}
.modal-bg.open{display:flex}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:10px;max-width:720px;width:100%;max-height:90vh;overflow-y:auto}
.modal-head{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--bg2);z-index:1}
.modal-head h3{font-size:16px;font-weight:700}
.xbtn{background:none;border:none;color:var(--text2);font-size:20px;cursor:pointer;line-height:1;padding:2px 6px}
.xbtn:hover{color:var(--text)}
.modal-body{padding:16px}

@media(max-width:700px){
  html,body{max-width:100%;overflow-x:hidden}
  .tab{padding:10px}
  .groups-grid,.actual-ko-grid{grid-template-columns:1fr}
  /* header: rida1 = logo + hamburger; rida2 = nimi + lukk + Laadi tulemused; nav & Eksport/Vaheta menuusse */
  header{flex-wrap:wrap;height:auto;min-height:50px;padding:8px 12px;gap:8px}
  .logo{font-size:15px;flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;order:1}
  .hamburger{display:flex;order:2}
  header::after{content:"";flex-basis:100%;height:0;order:3}
  #hchip{order:4;flex-shrink:1;max-width:130px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;display:inline-block;vertical-align:middle}
  #hlock{order:5;flex-shrink:0}
  #hdr-fetch-btn{order:6;flex-shrink:0;font-size:12px;padding:6px 10px}
  #theme-btn{order:7;flex-shrink:0;font-size:12px;padding:6px 10px}
  nav{order:10;flex-basis:100%;width:100%;flex-direction:column;gap:6px;display:none}
  .header-r{order:11;flex-basis:100%;width:100%;flex-direction:column;align-items:stretch;gap:6px;display:none;border-top:1px solid var(--border);padding-top:8px}
  header.menu-open nav,header.menu-open .header-r{display:flex}
  .nb{width:100%;text-align:center;font-size:14px;padding:10px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--r)}
  .nb .bdg{display:inline-block;position:static;margin-left:6px}
  .header-r .btn{display:block;width:100%;font-size:14px;padding:10px}
  /* modal mahub vaiksele ekraanile */
  .modal-bg{padding:8px}
  .modal{max-height:94vh}
  .modal-body{padding:12px}
  .modal-body table td,.modal-body table th{padding:6px 6px!important}
  /* Ajakava mobiilis: tihedam, et meeskonnanimed mahuksid */
  .sched-match{gap:5px;padding:7px 8px}
  .sched-grp{min-width:18px;font-size:9px}

// ═══════ SCORING ═══════
function koSet(arr){return new Set((arr||[]).filter(Boolean));}
function calcScore(p){
  const act=getActual();
  let grp=0,r32s=0,r16s=0,qfs=0,sfs=0,fin=0;
  Object.keys(GROUPS).forEach(g=>{GM.forEach((_,mi)=>{const k=`${g}_${mi}`;if(act.results[k]&&p.results&&p.results[k]===act.results[k])grp++;});});
  const rounds={r32:0,r16:0,qf:0,sf:0};
  // 1/16, 1/8, 1/4, 1/2: HULGAPÕHINE — iga ennustatud vooru võitja, kes ka tegelikult
  // selle vooru oma mängu võitis (= jõudis tegelike võitjate hulka), annab punkte,
  // sõltumata bracketi asukohast.
  ['r32','r16','qf','sf'].forEach(rnd=>{
    const aSet=koSet(act.ko[rnd]);
    koSet(p.ko?.[rnd]).forEach(t=>{if(aSet.has(t))rounds[rnd]+=RND_PTS[rnd];});
  });
  if(act.ko.final&&p.ko?.final===act.ko.final)fin=RND_PTS.final;
  return{total:grp+rounds.r32+rounds.r16+rounds.qf+rounds.sf+fin,grp,r32:rounds.r32,r16:rounds.r16,qf:rounds.qf,sf:rounds.sf,fin};
}
function hasAnyActual(){const a=getActual();return Object.values(a.results).some(Boolean)||(a.ko.r32||[]).some(Boolean)||!!a.ko.final;}

// ═══════ STANDINGS ═══════
function calcStandings(letter,p){
  const teams=GROUPS[letter],st=teams.map(t=>({name:t,pts:0,w:0,d:0,l:0,played:0}));
  gmOf(letter).forEach(([hi,ai],mi)=>{
    const r=p.results&&p.results[`${letter}_${mi}`];if(!r)return;
    st[hi].played++;st[ai].played++;
    if(r==='W'){st[hi].pts+=3;st[hi].w++;st[ai].l++;}
    else if(r==='T'){st[hi].pts++;st[ai].pts++;st[hi].d++;st[ai].d++;}
    else{st[ai].pts+=3;st[ai].w++;st[hi].l++;}
  });
  return[...st].sort((a,b)=>b.pts-a.pts||b.w-a.w||a.name.localeCompare(b.name));
}
function getQ(p){const q={};Object.keys(GROUPS).forEach(g=>{const st=calcStandings(g,p);q[`W-${g}`]=st[0]?.name;q[`R-${g}`]=st[1]?.name;});return q;}
function resolveSlot(slot,p){
  const q=getQ(p);
  if(slot.startsWith('W-')||slot.startsWith('R-'))return q[slot]||slot;
  if(slot.startsWith('TH-'))return resolveThird(slot.slice(3),(p.thirds||[]))||`3. koht (${slot.slice(3)})`;
  if(slot.startsWith('T-')){const i=parseInt(slot.slice(2));return(p.thirds||[])[i]||`3. koht #${i+1}`;}
  return slot;
}
function isSlot(s){return!s||s.startsWith('W-')||s.startsWith('R-')||s.startsWith('TH-')||s.startsWith('T-')||s.startsWith('3. koht');}
// Leia meeskonna grupp
function thirdGroupOf(team){for(const g of Object.keys(GROUPS))if(GROUPS[g].includes(team))return g;return null;}
// Annex C abil: millise meeskonna saab grupivõitja 'col' (nt 'E') vastaseks valitud 8 kolmanda koha hulgast
function resolveThird(col,thirds){
  if(!thirds||thirds.length<8)return null;
  const byGroup={};thirds.forEach(t=>{const g=thirdGroupOf(t);if(g)byGroup[g]=t;});
  const key=Object.keys(byGroup).sort().join('');
  const alloc=THIRD_ALLOC[key];
  if(!alloc)return null;
  return byGroup[alloc[TH_COLS[col]]]||null;
}
function flag(t){return FLAGS[t]||'';}
function esc(s){return String(s).replace(/\\/g,'\\\\').replace(/'/g,"\\'");}
function nameHue(n){let h=0;for(const c of n)h=(h*31+c.charCodeAt(0))%360;return h;}

// ═══════ PROGRESS ═══════
function countPreds(p){
  if(!p)return 0;let n=0;
  Object.keys(GROUPS).forEach(g=>GM.forEach((_,mi)=>{if(p.results&&p.results[`${g}_${mi}`])n++;}));
  n+=Math.min((p.thirds||[]).length,8);
  n+=(p.ko?.r32||[]).filter(Boolean).length+(p.ko?.r16||[]).filter(Boolean).length+
     (p.ko?.qf||[]).filter(Boolean).length+(p.ko?.sf||[]).filter(Boolean).length;
  if(p.ko?.tp)n++;if(p.ko?.final)n++;return n;
}
function updateProgress(){
  const p=myPreds(),n=countPreds(p),pct=Math.round(n/TOTAL_PREDS*100);
  document.getElementById('prog-fill').style.width=pct+'%';
  document.getElementById('prog-pct').textContent=pct+'%';
  const gm=Object.keys(GROUPS).reduce((acc,g)=>acc+GM.filter((_,mi)=>!p.results||!p.results[`${g}_${mi}`]).length,0);
  const bg=document.getElementById('bdg-g');bg.textContent=gm;bg.style.display=gm>0?'inline':'none';
  const km=[8-Math.min((p.thirds||[]).length,8),16-(p.ko?.r32||[]).filter(Boolean).length,
    8-(p.ko?.r16||[]).filter(Boolean).length,4-(p.ko?.qf||[]).filter(Boolean).length,
    2-(p.ko?.sf||[]).filter(Boolean).length,(p.ko?.tp?0:1)+(p.ko?.final?0:1)].reduce((a,b)=>a+b,0);
  const bk=document.getElementById('bdg-ko');bk.textContent=km;bk.style.display=km>0?'inline':'none';
  ['third','r32','r16','qf','sf','final'].forEach(k=>{
    const el=document.getElementById('kc-'+k);if(!el)return;
    const done={third:(p.thirds||[]).length>=8,r32:(p.ko?.r32||[]).filter(Boolean).length===16,
      r16:(p.ko?.r16||[]).filter(Boolean).length===8,qf:(p.ko?.qf||[]).filter(Boolean).length===4,
      sf:(p.ko?.sf||[]).filter(Boolean).length===2,final:!!(p.ko?.tp&&p.ko?.final)}[k];
    el.textContent=done?'✓':'';
  });
}

function renderLogin(){
  updateAdminSections();
  const s=getAll(),now=new Date(),diff=TOURNAMENT_START-now;
  const cdown=document.getElementById('cdown');
  if(diff>0){const d=Math.floor(diff/86400000),h=Math.floor((diff%86400000)/3600000);
    cdown.textContent=`⏰ Turniir algab ${d} päeva ja ${h} tunni pärast`;cdown.className='cdown-box cdown-open';}
  else{cdown.textContent='🔒 Turniir on käimas – ennustused lukustatud';cdown.className='cdown-box cdown-locked';}
  const list=document.getElementById('player-list');
  if(!s.players.length){list.innerHTML='<p style="color:var(--text2);font-size:12px;text-align:center;padding:6px">Mängijaid pole veel lisatud</p>';return;}
  list.innerHTML=s.players.map(n=>{
    const p=s.preds[n]||freshPreds(),cnt=countPreds(p),pct=Math.round(cnt/TOTAL_PREDS*100),done=cnt===TOTAL_PREDS;
    const sc=calcScore(p),champ=p.ko?.final||'',hue=nameHue(n);
    const scoreStr=hasAnyActual()?` · ${sc.total}p`:'';
    return`<div class="player-item" onclick="login('${esc(n)}')">
      <div class="avatar" style="background:hsl(${hue},45%,32%)">${n[0].toUpperCase()}</div>
      <div class="p-name">${n}</div>
      <div class="${done?'p-done':'p-prog'}">${done?'✓ Valmis':pct+'%'}${scoreStr}${champ?' · 🏆 '+champ:''}</div>
      ${isAdmin()?`<button onclick="event.stopPropagation();deletePlayer('${esc(n)}')" style="background:none;border:none;color:var(--text2);cursor:pointer;font-size:16px;padding:0 4px;line-height:1" title="Kustuta mängija">×</button>`:''}
    </div>`;
  }).join('');
}

function pickKo(round,mi,team){

// Eemaldab ainult need play-off valikud, mis enam ei kehti (meeskond pole enam selles paaris).
// Säilitab kõik valikud, mida grupimuutus ei mõjutanud. Tagastab true, kui midagi muudeti.
function pruneInvalidKo(p){
  let changed=false;
  // 1/16: kontrolli iga valik tegelikult lahendatud paari vastu
  const r32pairs=r32Pairs(p);
  if(!p.ko.r32)p.ko.r32=[];
  r32pairs.forEach(([tA,tB],i)=>{
    const w=p.ko.r32[i];
    if(w&&w!==tA&&w!==tB){p.ko.r32[i]=null;changed=true;}
  });
  // Järgnevad voorud: võitja peab olema eelmise vooru valitud meeskondade hulgas
  const chain=[['r16','r32',8],['qf','r16',4],['sf','qf',2]];
  chain.forEach(([rnd,prev,n])=>{
    if(!p.ko[rnd])p.ko[rnd]=[];
    const pw=p.ko[prev]||[];
    for(let i=0;i<n;i++){
      const a=pw[i*2],b=pw[i*2+1],w=p.ko[rnd][i];
      if(w&&w!==a&&w!==b){p.ko[rnd][i]=null;changed=true;}
    }
  });
  // Finaal: säilita maailmameistri valik, KUNI mõlemad poolfinaalid on täidetud ja
  // valik nendega vastuolus. Nii ei kao champion-ennustus poolikute play-off valikute tõttu.
  const sf=p.ko.sf||[];
  if(p.ko.final&&sf[0]&&sf[1]&&p.ko.final!==sf[0]&&p.ko.final!==sf[1]){p.ko.final=null;changed=true;}
  // 3. koha mäng: peab olema üks kahest poolfinaali kaotajast (lahendatakse finalistide järgi)
  // Lihtsuse mõttes jäta tp alles kui mõlemad poolfinaalid täidetud; muidu nulli kui kehtetu
  return changed;
}
// Eemalda play-off valikutest AINULT need meeskonnad, kes pole enam mängija bracketis
// kvalifitseerunute hulgas (nt grupiennustuse muutuse tõttu). Asukohta ega paare EI muudeta
// ja ühtegi kehtivat valikut ei kustutata — nii säilivad kõik ennustused (1/16…finaal),
// ka peale ametliku skeemi muutust. Hulgapõhine skoor loeb need olenemata asukohast.
function pruneByPool(p){
  if(!p||!p.ko)return false;
  // Ainult kui mängija on KÕIK grupimängud ennustanud — muidu pool pole usaldusväärne, ära kustuta
  const complete=Object.keys(GROUPS).every(g=>gmOf(g).every((_,mi)=>p.results&&p.results[g+'_'+mi]));
  if(!complete)return false;
  let changed=false;
  const q=getQ(p),pool=new Set();
  Object.keys(GROUPS).forEach(g=>{if(q['W-'+g])pool.add(q['W-'+g]);if(q['R-'+g])pool.add(q['R-'+g]);});
  (p.thirds||[]).forEach(t=>{if(t)pool.add(t);});
  ['r32','r16','qf','sf'].forEach(rnd=>{
    if(!Array.isArray(p.ko[rnd]))return;
    const arr=p.ko[rnd].map(t=>(t&&!pool.has(t))?null:t);
    if(JSON.stringify(arr)!==JSON.stringify(p.ko[rnd])){p.ko[rnd]=arr;changed=true;}
  });
  if(p.ko.final&&!pool.has(p.ko.final)){p.ko.final=null;changed=true;}
  if(p.ko.tp&&!pool.has(p.ko.tp)){p.ko.tp=null;changed=true;}
  return changed;
}
function clearKoDownstream(p,round,mi){
  const seq=['r32','r16','qf','sf'];let idx=seq.indexOf(round),midx=mi;
  while(idx<seq.length-1){idx++;midx=Math.floor(midx/2);if(!p.ko[seq[idx]])break;p.ko[seq[idx]][midx]=null;}
  p.ko.tp=null;p.ko.final=null;
}
function clearKoFrom(p,round){
  const seq=['r32','r16','qf','sf'],idx=seq.indexOf(round);
  for(let i=idx;i<seq.length;i++)p.ko[seq[i]]=[];p.ko.tp=null;p.ko.final=null;
}

  // KÕIK mängud kronoloogilises järjekorras, millel on tulemus (grupp + play-off)

    if(act.results&&act.results[key])ordered.push({type:'g',key,time:new Date(`${d}T${t}:00Z`).getTime()});
  });
  KO_ROUNDS.forEach(rnd=>{
    for(let i=0;i<rnd.n;i++){
      const sc=KO_SCHED[rnd.no[i]];if(!sc)continue;
      const w=koWinner(rnd.key,i,act);
      if(w)ordered.push({type:'k',round:rnd.key,w,time:new Date(`${sc[0]}T${sc[1]}:00Z`).getTime()});
    }
  });
  ordered.sort((a,b)=>a.time-b.time);
  if(!ordered.length)return'';
  // Kas mängija ennustas selle mängu õigesti? (puudub või vale → katkeb)
  const isCorrect=(p,o)=>{
    if(o.type==='g')return !!(p.results&&p.results[o.key]&&p.results[o.key]===act.results[o.key]);
    if(o.round==='final')return !!(p.ko&&p.ko.final===o.w);
    if(o.round==='tp')return !!(p.ko&&p.ko.tp===o.w);
    return koSet(p.ko&&p.ko[o.round]).has(o.w); // 1/16…1/2: kas võitnud meeskond on mängija valikute hulgas
  };
  const rows=s.players.map(n=>{
    const p=s.preds[n]||freshPreds();
    let best=0,cur=0;
    ordered.forEach(o=>{if(isCorrect(p,o)){cur++;if(cur>best)best=cur;}else cur=0;});
    // praegune seeria (lõpeb viimase mänguga)
    let curEnd=0;
    for(let i=ordered.length-1;i>=0;i--){if(isCorrect(p,ordered[i]))curEnd++;else break;}
    return{name:n,best,cur:curEnd};
  }).filter(r=>r.best>0)
    .sort((a,b)=>b.best-a.best||b.cur-a.cur||a.name.localeCompare(b.name))
    .slice(0,5);
  if(!rows.length)return'';
  let prevB=-1,prevRank=0;
  const list=rows.map((r,i)=>{
    const rank=r.best!==prevB?i+1:prevRank;prevB=r.best;prevRank=rank;
    const medal=rank===1?'🥇':rank===2?'🥈':rank===3?'🥉':rank;
    const isMe=r.name===me;
    const ongoing=r.cur===r.best&&r.cur>0;
    return`<div style="display:flex;align-items:center;gap:10px;padding:8px 10px;border-bottom:1px solid var(--border)">
      <div style="width:26px;text-align:center;font-size:14px;flex-shrink:0">${medal}</div>
      <div style="flex:1;min-width:0;font-size:13px;font-weight:${isMe?700:500};color:${isMe?'var(--green3)':'var(--text)'};overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${r.name}${isMe?' <span style="font-size:10px;color:var(--green3)">(mina)</span>':''}</div>
      <div style="font-size:11px;color:var(--text2);flex-shrink:0">${ongoing?'🔥 käib':''}</div>
      <div style="font-size:18px;font-weight:800;color:var(--green3);min-width:46px;text-align:right;flex-shrink:0">${r.best}<span style="font-size:10px;color:var(--text2);font-weight:400"> õiget</span></div>
    </div>`;
  }).join('');
  return`<div style="background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:16px;margin-top:20px">
    <h3 style="font-size:15px;margin-bottom:6px">🔥 Pikim õigete seeria (streak)</h3>
    <p style="font-size:11px;color:var(--text2);margin-bottom:10px">Mängude toimumise järjekorras järjest õigesti ennustatud mängud (grupp + play-off). Play-offis on õige, kui edasipääsenu on su valikute hulgas. Puuduv või vale vastus katkestab seeria. 🔥 = seeria kestab praegu.</p>
    ${list}
  </div>`;
}

  const bars=ranked.map(({name,sc},i)=>{

}

// ═══════ PREDICTIONS SUMMARY ═══════
function renderPredsSummary(s){
  if(!s.players.length)return'';
  // Champion picks
  const champCount={};
  s.players.forEach(n=>{const c=(s.preds[n]||freshPreds()).ko?.final;if(c){champCount[c]=(champCount[c]||0)+1;}});
  const champEntries=Object.entries(champCount).sort((a,b)=>b[1]-a[1]);
  const champHtml=champEntries.length?champEntries.map(([t,cnt])=>{
    const pct=Math.round(cnt/s.players.length*100);
    return`<div style="display:flex;align-items:center;gap:8px;margin-bottom:5px">
      <div style="width:130px;font-size:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${flag(t)} ${t}</div>
      <div style="flex:1;background:var(--bg3);border-radius:4px;height:18px;overflow:hidden">
        <div style="width:${pct}%;height:100%;background:var(--goldbg);border:1px solid var(--gold);border-radius:4px"></div>
      </div>
      <div style="font-size:11px;color:var(--gold);min-width:40px;text-align:right">${cnt}/${s.players.length}</div>
    </div>`;
  }).join(''):`<p style="color:var(--text2);font-size:12px">Keegi pole veel finalistit ennustanud.</p>`;

  // Group match consensus
  const act=getActual();
  // Mängu toimumisaeg (UTC) iga grupimängu kohta — sorteerimiseks
  const schedTime={};
  SCHEDULE.forEach(([grp,mi,d,t])=>{schedTime[`${grp}_${mi}`]=new Date(`${d}T${t}:00Z`).getTime();});
  const consensusList=[];
  Object.entries(GROUPS).forEach(([letter,teams])=>{
    gmOf(letter).forEach(([hi,ai],mi)=>{
      const key=`${letter}_${mi}`;
      const ar=act.results&&act.results[key];
      if(!ar)return;
      const counts={W:0,T:0,L:0,none:0};
      s.players.forEach(n=>{const r=(s.preds[n]||freshPreds()).results?.[key];counts[r||'none']++;});
      const total=s.players.length,w=counts.W,t=counts.T,l=counts.L;
      if(!w&&!t&&!l)return;
      const seg=(val,color,label)=>val?`<div style="flex:${val};background:${color};height:100%;display:flex;align-items:center;justify-content:center"><span style="font-size:10px;font-weight:700;color:#fff">${val>0&&(val/total)>0.12?label:''}</span></div>`:'';
      consensusList.push({time:schedTime[key]||0,html:`<div style="margin-bottom:6px">
        <div style="display:flex;justify-content:space-between;margin-bottom:2px">
          <span style="font-size:11px">${flag(teams[hi])} ${teams[hi]} vs ${flag(teams[ai])} ${teams[ai]}</span>
          <span style="font-size:10px;color:${ar?'var(--green3)':'var(--text2)'}">${ar?'Tulemus: '+ar:''}</span>
        </div>
        <div style="display:flex;height:18px;border-radius:4px;overflow:hidden;gap:1px">
          ${seg(w,'var(--green)','W')}${seg(t,'#7a6a00','T')}${seg(l,'var(--red)','L')}${seg(counts.none,'var(--bg3)','')}
        </div>
      </div>`});
    });
  });
  // Kõige hilisemad mängud üles, varem toimunud alla
  consensusList.sort((a,b)=>b.time-a.time);
  const consensusRows=consensusList.map(x=>x.html).join('');

  return`<div style="background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:16px;margin-top:14px">
    <h3 style="font-size:15px;margin-bottom:14px">🔮 Ennustuste kokkuvõte</h3>
    <h4 style="font-size:12px;color:var(--text2);margin-bottom:10px;text-transform:uppercase;letter-spacing:.5px">🏆 Maailmameistri ennustused</h4>
    ${champHtml}
    ${consensusRows?`<h4 style="font-size:12px;color:var(--text2);margin:14px 0 10px;text-transform:uppercase;letter-spacing:.5px">⚽ Grupiturniiri konsensus</h4>
    <p style="font-size:11px;color:var(--text2);margin-bottom:8px">Roheline=W · Kollane=T · Punane=L (ainult peetud mängud)</p>
    ${consensusRows}`:''}</div>`;
}

function setActualScore(letter,mi,side,val){
  const key=`${letter}_${mi}`;
  updateActual(a=>{
    if(!a.scores)a.scores={};
    if(!a.scores[key])a.scores[key]={h:null,a:null};
    a.scores[key][side]=val===''?null:parseInt(val);
    const sc=a.scores[key];
    if(sc.h!==null&&sc.a!==null){
      if(!a.results)a.results={};
      a.results[key]=toWTL(sc.h,sc.a);
    }
  });
  renderResults();renderGroups();updateFetchBtn();
  if(document.getElementById('tab-schedule')&&document.getElementById('tab-schedule').classList.contains('active'))renderSchedule();
}
function setActualResult(letter,mi,val){
  updateActual(a=>{if(!a.results)a.results={};const k=`${letter}_${mi}`;a.results[k]=a.results[k]===val?null:val;});
  renderResults();renderGroups();updateFetchBtn();
  if(document.getElementById('tab-schedule')&&document.getElementById('tab-schedule').classList.contains('active'))renderSchedule();
}
function calcStandingsFull(letter,act){
  const teams=GROUPS[letter],st=teams.map(t=>({name:t,mp:0,w:0,d:0,l:0,gf:0,ga:0,pts:0}));
  gmOf(letter).forEach(([hi,ai],mi)=>{
    const key=`${letter}_${mi}`,r=act.results&&act.results[key],sc=act.scores&&act.scores[key];
    if(!r)return;
    st[hi].mp++;st[ai].mp++;
    const hg=sc?.h??0,ag=sc?.a??0;
    st[hi].gf+=hg;st[hi].ga+=ag;st[ai].gf+=ag;st[ai].ga+=hg;
    if(r==='W'){st[hi].pts+=3;st[hi].w++;st[ai].l++;}
    else if(r==='T'){st[hi].pts++;st[ai].pts++;st[hi].d++;st[ai].d++;}
    else{st[ai].pts+=3;st[ai].w++;st[hi].l++;}
  });
  return[...st].sort((a,b)=>b.pts-a.pts||(b.gf-b.ga)-(a.gf-a.ga)||b.gf-a.gf||a.name.localeCompare(b.name));
}

      return`<tr style="background:${bg};border-top:1px solid var(--border)">
        <td style="padding:5px 8px;font-weight:600;color:${c1}">${i+1}</td>
        <td style="padding:5px 8px;white-space:nowrap">${flag(t.name)} ${t.name}</td>

        <td style="padding:5px 8px;text-align:center">${t.l}</td>
        <td style="padding:5px 8px;text-align:center">${t.gf}</td>
        <td style="padding:5px 8px;text-align:center">${t.ga}</td>
        <td style="padding:5px 8px;text-align:center;color:${gd>0?'var(--green3)':gd<0?'#f85149':'var(--text2)'}">${gd>0?'+':''}${gd}</td>

    return`<div style="background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);overflow:hidden">
      <div style="background:var(--bg3);padding:7px 10px;font-size:12px;font-weight:700;color:var(--gold);border-bottom:1px solid var(--border)">Group ${letter}</div>
      <div style="overflow-x:auto"><table class="std-table" style="width:100%;border-collapse:collapse;font-size:12px">
        <thead><tr>
          <th style="${thStyle}">#</th><th style="${thStyle};text-align:left">Team</th>
          <th style="${thStyle}">MP</th><th style="${thStyle}">W</th><th style="${thStyle}">D</th><th style="${thStyle}">L</th>
          <th style="${thStyle}">GF</th><th style="${thStyle}">GA</th><th style="${thStyle}">GD</th><th style="${thStyle}">Pts</th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table></div>
    </div>`;
  }).join('');
  return`<div class="results-section">
    <h3>Group Standings</h3>
    <div class="std-grid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(420px,1fr));gap:12px">${tables}</div>
  </div>`;
}

    const matches=order.map(mi=>{
      const cur=(act.ko[rnd]&&act.ko[rnd][mi])||'';

        </select>
        ${koScoreInputs(act,num,admin)}</div>`;
    }).join('');
    return`<div class="results-section"><h3>${RND_NAMES[rnd]} võitjad <span class="rtag">+${RND_PTS[rnd]}p</span></h3>
      <div class="actual-ko-grid">${matches}</div></div>`;
  }).join('');
  const f=act.ko.final||'',tp3=act.ko.tp||'';
  const finalHtml=`<div class="results-section"><h3>Finaal + 3. koha mäng <span class="rtag">+20p finaali eest</span></h3>
    <div class="actual-ko-grid">
      <div class="actual-match"><label>🏆 Finaali võitja (maailmameister)</label>
        <select onchange="setActualKoFinal(this.value)" ${dis}><option value="">– vali –</option>
          ${ALL_TEAMS.map(t=>`<option value="${esc(t)}" ${f===t?'selected':''}>${flag(t)} ${t}</option>`).join('')}
        </select>
        ${koScoreInputs(act,104,admin)}</div>
      <div class="actual-match"><label>🥉 3. koha mängu võitja</label>
        <select onchange="setActualKoTp(this.value)" ${dis}><option value="">– vali –</option>
          ${ALL_TEAMS.map(t=>`<option value="${esc(t)}" ${tp3===t?'selected':''}>${flag(t)} ${t}</option>`).join('')}
        </select>
        ${koScoreInputs(act,103,admin)}</div>
    </div></div>`;
  return koHtml+finalHtml;

// Play-off mängu skoori sisestus (mängunumbri järgi). Skoor on informatiivne — edasipääseja määrab endiselt valik ülal.
function koScoreInputs(act,num,admin){
  const sc=(act.ko&&act.ko.scores&&act.ko.scores[num])||{};
  const inp=(field,val)=>admin
    ?`<input type="number" min="0" max="99" value="${val??''}" placeholder="-"
        onchange="setActualKoScore(${num},'${field}',this.value)"
        style="width:32px;background:var(--bg);border:1px solid var(--border);border-radius:4px;color:var(--text);font-size:13px;font-weight:700;text-align:center;padding:2px 0;outline:none">`
    :`<span style="width:32px;display:inline-block;text-align:center;font-size:13px;font-weight:700;color:var(--text)">${val??'–'}</span>`;
  const scoreLine=`<div style="display:flex;align-items:center;gap:3px;margin-top:5px">
    <span style="font-size:10px;color:var(--text2)">Skoor:</span>
    ${inp('h',sc.h)}<span style="color:var(--text2);font-size:11px">:</span>${inp('a',sc.a)}
  </div>`;
  // Penaltiseeria skoor (valikuline — täida ainult kui mäng läks penaltitele)
  const showPen=admin||sc.ph!=null||sc.pa!=null;
  const penLine=showPen?`<div style="display:flex;align-items:center;gap:3px;margin-top:3px">
    <span style="font-size:10px;color:var(--text2)">Pen:</span>
    ${inp('ph',sc.ph)}<span style="color:var(--text2);font-size:11px">:</span>${inp('pa',sc.pa)}
  </div>`:'';
  return scoreLine+penLine;
}

// Build lookup: "EstTeamHome|EstTeamAway" → { letter, mi }
function buildMatchLookup(){
  const lk={};
  Object.entries(GROUPS).forEach(([letter,teams])=>{
    gmOf(letter).forEach(([hi,ai],mi)=>{
      lk[`${teams[hi]}|${teams[ai]}`]={letter,mi,swap:false};
      lk[`${teams[ai]}|${teams[hi]}`]={letter,mi,swap:true};
    });
  });
  return lk;
}
function toWTL(homeScore,awayScore){return homeScore>awayScore?'W':homeScore<awayScore?'L':'T';}

// openfootball nime → Eesti nimi (sama nimekuju kui GROUPS-is)
const OF_MAP={
  'Mexico':'Mehhiko','South Korea':'Lõuna-Korea','South Africa':'Lõuna-Aafrika',
  'Czech Republic':'Tšehhi','Canada':'Kanada','Switzerland':'Šveits',
  'Bosnia & Herzegovina':'Bosnia-Herzegovina','Qatar':'Katar','Brazil':'Brasiilia',
  'Morocco':'Maroko','Haiti':'Haiti','Scotland':'Šotimaa','USA':'USA','Turkey':'Türgi',
  'Paraguay':'Paraguay','Australia':'Austraalia','Germany':'Saksamaa',
  'Ivory Coast':'Elevandiluurannik','Ecuador':'Ecuador','Curaçao':'Curaçao',
  'Netherlands':'Holland','Japan':'Jaapan','Sweden':'Rootsi','Tunisia':'Tuneesia',
  'Belgium':'Belgia','Iran':'Iraan','Egypt':'Egiptus','New Zealand':'Uus-Meremaa',
  'Spain':'Hispaania','Uruguay':'Uruguay','Saudi Arabia':'Saudi Araabia',
  'Cape Verde':'Roheneemesaared','France':'Prantsusmaa','Senegal':'Senegal',
  'Norway':'Norra','Iraq':'Iraak','Argentina':'Argentina','Algeria':'Alžeeria',
  'Austria':'Austria','Jordan':'Jordaania','Portugal':'Portugal','Colombia':'Colombia',
  'DR Congo':'DR Kongo','Uzbekistan':'Usbekistan','England':'Inglismaa',
  'Croatia':'Horvaatia','Ghana':'Ghana','Panama':'Panama',
};
function ofName(n){return OF_MAP[n]||n;}

// Avalik public-domain andmeallikas, otse raw.githubusercontent.com (CORS-sõbralik, proksit pole vaja)
const OF_URL='https://raw.githubusercontent.com/openfootball/worldcup.json/master/2026/worldcup.json';

// Loeb openfootball JSON-i ja uuendab grupimängude tulemused + skoorid.
// Tagastab uuendatud mängude arvu, või -1 kui ühendus ebaõnnestus.
async function fetchFromOpenfootball(){
  const lk=buildMatchLookup();
  let data;
  try{
    const res=await fetch(OF_URL,{cache:'no-store'});
    if(!res.ok){console.warn('[MM2026] HTTP viga:',res.status,res.statusText);return -1;}
    const txt=await res.text();
    data=JSON.parse(txt);
  }catch(err){console.warn('[MM2026] Fetch ebaõnnestus:',err&&err.message?err.message:err);return -1;}
  const matches=(data&&data.matches)||[];
  let n=0;
  matches.forEach(mt=>{
    if(!mt.score||!mt.score.ft)return;         // ainult peetud mängud
    const hN=ofName(mt.team1||''),aN=ofName(mt.team2||'');
    const hS=parseInt(mt.score.ft[0]),aS=parseInt(mt.score.ft[1]);
    if(isNaN(hS)||isNaN(aS))return;
    if(mt.group){
      // ── GRUPIMÄNG ──
      const m=lk[`${hN}|${aN}`];               // sobita meeskonnapaari alusel
      if(!m)return;
      let res,hs,as_;
      if(!m.swap){res=toWTL(hS,aS);hs=hS;as_=aS;}
      else{const r=toWTL(hS,aS);res=r==='W'?'L':r==='L'?'W':'T';hs=aS;as_=hS;}
      updateActual(a=>{
        if(!a.results)a.results={};if(!a.scores)a.scores={};
        const k=`${m.letter}_${m.mi}`;a.results[k]=res;a.scores[k]={h:hs,a:as_};
      });
      n++;
    } else if(mt.num && KO_NUM[mt.num]){
      // ── PLAY-OFF MÄNG ── võitja mängunumbri järgi (KO_NUM)
      // Otsusta võitja: penaltid > lisaaeg > põhiaeg; viik ilma penalteid -> jäta vahele
      const pick=arr=>{if(!arr||arr.length<2)return null;const a=parseInt(arr[0]),b=parseInt(arr[1]);return a>b?hN:b>a?aN:null;};
      const sc=mt.score;
      const win=pick(sc.p)||pick(sc.pen)||pick(sc.ps)||pick(sc.et)||pick(sc.aet)||pick(sc.ft);
      if(!win||(win!==hN&&win!==aN&&!ALL_TEAMS.includes(win)))return;
      const {key,index}=KO_NUM[mt.num];
      // Play-off skoor: eelista lisaaja (et/aet) tulemust, muidu põhiaeg (ft). Penaltid ei muuda väravaskoori.
      const goalArr=sc.et||sc.aet||sc.ft;
      const gh=goalArr?parseInt(goalArr[0]):null,ga=goalArr?parseInt(goalArr[1]):null;
      updateActual(a=>{
        if(!a.ko)a.ko={r32:[],r16:[],qf:[],sf:[],tp:null,final:null};
        if(key==='final')a.ko.final=win;
        else if(key==='tp')a.ko.tp=win;
        else{if(!a.ko[key])a.ko[key]=[];a.ko[key][index]=win;}
        // Salvesta skoor ajakava jaoks, orienteeritud ajakava (tA:tB) järjekorda
        if(gh!=null&&!isNaN(gh)&&ga!=null&&!isNaN(ga)){
          if(!a.ko.scores)a.ko.scores={};
          let flip=false;
          try{
            const aq=getActQ(a),bt=actBestThirds(a);
            const [tA,tB]=actualKoTeams(key,index,a,aq,bt);
            if(tA===aN&&tB===hN)flip=true;
          }catch(e){}
          const rec={h:flip?ga:gh,a:flip?gh:ga};
          const penArr=sc.p||sc.pen||sc.ps; // penaltiseeria, kui oli
          if(penArr&&penArr.length>=2){
            const ph=parseInt(penArr[0]),pa=parseInt(penArr[1]);
            if(!isNaN(ph)&&!isNaN(pa)){rec.ph=flip?pa:ph;rec.pa=flip?ph:pa;}
          }
          a.ko.scores[mt.num]=rec;
        }
      });
      n++;
    }
  });
  return n;
}

      <div style="font-size:10px;color:var(--text2);margin-top:2px">${l}</div>

function showMatchPredictions(letter,mi,home,away){
  const s=getAll(),act=getActual();
  const ar=act.results&&act.results[`${letter}_${mi}`];
  const lbls={W:`🏠 ${home} võidab`,T:'🤝 Viik',L:`✈️ ${away} võidab`};
  const rows=s.players.map(name=>{
    const p=s.preds[name]||freshPreds();
    const r=p.results&&p.results[`${letter}_${mi}`];
    if(!r)return`<tr><td style="padding:6px 10px">${name}</td><td style="padding:6px 10px;color:var(--text2);font-style:italic">Ennustamata</td><td></td></tr>`;
    const correct=ar&&r===ar,wrong=ar&&r&&r!==ar;
    const color=correct?'var(--green3)':wrong?'#f85149':'var(--text)';
    const badge=correct?'✓':wrong?'✗':'';
    return`<tr style="border-top:1px solid var(--border)">
      <td style="padding:6px 10px;font-weight:500">${name}${name===me?' <span style="font-size:10px;color:var(--green3)">(mina)</span>':''}</td>
      <td style="padding:6px 10px;color:${color}">${lbls[r]||r}</td>
      <td style="padding:6px 10px;color:${color};font-weight:700">${badge}</td>
    </tr>`;
  }).join('');
  const actRow=ar?`<div style="background:var(--green4);border:1px solid var(--green);border-radius:6px;padding:8px 12px;margin-bottom:12px;font-size:13px">✅ Tegelik tulemus: <strong style="color:var(--green3)">${lbls[ar]||ar}</strong></div>`:'';
  document.getElementById('modal-title').textContent=`${flag(home)} ${home} vs ${flag(away)} ${away}`;
  document.getElementById('modal-body').innerHTML=`${actRow}<table style="width:100%;border-collapse:collapse"><thead><tr style="font-size:11px;color:var(--text2)"><th style="padding:4px 10px;text-align:left">Mängija</th><th style="padding:4px 10px;text-align:left">Ennustus</th><th style="padding:4px 10px"></th></tr></thead><tbody>${rows}</tbody></table>`;
  document.getElementById('modal-bg').classList.add('open');
}

function updateAdminSections(){

  document.getElementById('scores-section').style.display=admin?'none':'block';

function resetViewerMode(){
  if(!confirm('Lähtesta vaaterežiim? Sinu enda ennustused säilivad, aga teiste andmed eemaldatakse.'))return;
  setViewerMode(false);
  // Remove other players' data, keep only own
  const s=getAll();
  if(me){
    const myPred=s.preds[me];
    s.players=[me];
    s.preds={[me]:myPred};
    s.actual=freshActual();
    saveAll(s);
  }
  renderLogin();
}
function deletePlayer(name){
  if(!isAdmin())return;
  if(!confirm(`Kustuta mängija "${name}"? See eemaldab kõik tema ennustused.`))return;
  const s=getAll();
  s.players=s.players.filter(p=>p!==name);
  delete s.preds[name];
  saveAll(s);
  renderLogin();
}

function importPreds(event){
  const file=event.target.files[0];if(!file)return;
  const status=document.getElementById('import-status');
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const data=JSON.parse(e.target.result);
      if(!data.name||!data.preds){status.textContent='❌ Vigane fail';status.style.color='var(--red)';return;}
      const s=getAll();
      if(!s.players.includes(data.name))s.players.push(data.name);

      saveAll(s);

      renderLogin();
    }catch{status.textContent='❌ Faili lugemine ebaõnnestus';status.style.color='var(--red)';}

  reader.readAsText(file);
  event.target.value='';
}

// Convert UTC datetime to Estonian time string (UTC+3 in summer)
function toEeTime(dateStr, timeStr) {
  const [h, m] = timeStr.split(':').map(Number);
  const utc = new Date(`${dateStr}T${timeStr}:00Z`);
  // Estonia is UTC+3 in summer (EEST)
  const ee = new Date(utc.getTime() + 3 * 3600000);
  const hh = String(ee.getUTCHours()).padStart(2,'0');
  const mm = String(ee.getUTCMinutes()).padStart(2,'0');
  return `${hh}:${mm}`;
}
function toEeDate(dateStr, timeStr) {
  const utc = new Date(`${dateStr}T${timeStr}:00Z`);
  const ee = new Date(utc.getTime() + 3 * 3600000);
  return ee.toISOString().slice(0,10);
}

function formatEeDate(dateStr) {
  const d = new Date(dateStr + 'T12:00:00Z');

  return `${day} ${dd}. ${mon}`;

    body=col(tA)+col(tB);
    const neither=s.players.filter(n=>{const p=s.preds[n]||freshPreds();return !supports(p,tA)&&!supports(p,tB);});
    if(neither.length)body+=`<div style="font-size:12px;color:var(--text2);font-style:italic;margin-top:6px">Kumbagi ei pakkunud: ${neither.join(', ')}</div>`;
  }else{
    // Meeskonnad pole veel selgunud → näita selle bracketi-sloti ennustusi
    const pickOf=p=>p.ko&&p.ko[roundKey]&&p.ko[roundKey][i];
    const groups={};let none=[];
    s.players.forEach(name=>{const p=s.preds[name]||freshPreds();const t=pickOf(p);if(!t){none.push(name);return;}(groups[t]=groups[t]||[]).push(name);});
    const teams=Object.keys(groups).sort((a,b)=>groups[b].length-groups[a].length);
    body=teams.length?teams.map(t=>{const ok=aw&&aw===t;const names=groups[t].map(n=>n===me?`<strong style="color:var(--green3)">${n} (mina)</strong>`:n).join(', ');return `<div style="background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:8px 12px;margin-bottom:8px"><div style="font-weight:600;margin-bottom:3px">${flag(t)} ${t} <span style="font-size:11px;color:var(--text2);font-weight:400">— ${groups[t].length} häält</span></div><div style="font-size:12px;color:var(--text2)">${names}</div></div>`;}).join(''):`<p style="color:var(--text2);font-style:italic;padding:8px">Meeskonnad pole veel selgunud.</p>`;
  }
  const matchTitle=(tA||tB)?`${tA?flag(tA)+' '+tA:'?'} vs ${tB?flag(tB)+' '+tB:'?'}`:`${rnd.name}`;
  // Tulemus (skoor) — ainult selles play-off modaalis; penaltiseeria korral märgime "penaltitega"
  const koSc=(act.ko&&act.ko.scores)?act.ko.scores[rnd.no[i]]:null;
  let scoreRow='';
  if(koSc&&koSc.h!=null&&koSc.a!=null){
    const hasPen=(koSc.ph!=null&&koSc.pa!=null);
    const penDraw=(koSc.h===koSc.a&&!!aw);
    let penTxt='';
    if(hasPen)penTxt=` <span style="font-size:12px;color:var(--text2);font-weight:600">(penaltitega ${koSc.ph}:${koSc.pa})</span>`;
    else if(penDraw)penTxt=` <span style="font-size:12px;color:var(--text2);font-weight:600">(penaltitega)</span>`;
    scoreRow=`<div style="background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:8px 12px;margin-bottom:10px;font-size:14px;text-align:center">
      <span>${tA?flag(tA)+' '+tA:'?'}</span> <strong style="font-size:16px">${koSc.h} : ${koSc.a}</strong> <span>${tB?tB+' '+flag(tB):'?'}</span>${penTxt}
    </div>`;
  }
  const awRow=aw?`<div style="background:var(--green4);border:1px solid var(--green);border-radius:6px;padding:8px 12px;margin-bottom:12px;font-size:13px">✅ Edasi pääses: <strong style="color:var(--green3)">${flag(aw)} ${aw}</strong></div>`:'';
  document.getElementById('modal-title').textContent=`M${rnd.no[i]} · ${matchTitle}`;
  document.getElementById('modal-body').innerHTML=scoreRow+awRow+body;
  document.getElementById('modal-bg').classList.add('open');
}
// Bracketi struktuuri muutus EI kustuta enam ennustusi: jätame valikud puutumata
// (hulgapõhine skoor loeb need olenemata asukohast). Eemaldame vaid teamid, kes pole
// enam kvalifitseerunute hulgas.
function migrateBracket(){
  const s=getAll();let ch=false;
  (s.players||[]).forEach(n=>{if(s.preds[n]&&pruneByPool(s.preds[n]))ch=true;});
  if(ch)saveAll(s);
}
// ═══════ HEADER FETCH BUTTON ═══════
function updateFetchBtn() {
  const btn = document.getElementById('hdr-fetch-btn');
  if (!btn) return;
  btn.style.display = 'inline-block';
  // Check if there are finished matches without results
  const now = new Date();
  const act = getActual();
  let hasPending = false;
  SCHEDULE.forEach(([grp, mi, dateUTC, timeUTC]) => {
    const matchEnd = new Date(`${dateUTC}T${timeUTC}:00Z`).getTime() + 110*60000;
    if (now.getTime() > matchEnd) {
      const key = `${grp}_${mi}`;
      if (!act.results || !act.results[key]) hasPending = true;
    }
  });
  // Play-off mängud (KO_SCHED) — kui mäng on lõppenud, aga võitja puudub
  Object.keys(KO_SCHED).forEach(num=>{
    const [d,t]=KO_SCHED[num];
    const end=new Date(`${d}T${t}:00Z`).getTime()+130*60000;
    if(now.getTime()>end){const inf=KO_NUM[num];if(inf&&!koWinner(inf.key,inf.index,act))hasPending=true;}
  });
  if (hasPending) {
    btn.className = 'btn btn-sm btn-fetch-on';
    btn.textContent = '⬇ Laadi tulemused';
    btn.disabled = false;
    btn.title = 'Lõppenud mängude tulemused pole veel laaditud!';
  } else if (isAdmin()) {
    // Admin saab alati kõik openfootballist üle laadida (nt skoorid/penaltid, mis on juba olemas)
    btn.className = 'btn btn-sm btn-fetch-on';
    btn.textContent = '⟳ Lae tulemused uuesti';
    btn.disabled = false;
    btn.title = 'Kõik tulemused on olemas, aga admin saab need openfootballist üle laadida (skoorid + penaltid). Mängijate ennustusi see EI muuda.';
  } else {
    btn.className = 'btn btn-sm btn-fetch-off';
    btn.textContent = '✓ Tulemused ajakohased';
    btn.disabled = true;
    btn.title = 'Kõik lõppenud mängude tulemused on olemas';
  }
}
async function headerFetchResults() {
  const btn = document.getElementById('hdr-fetch-btn');
  btn.disabled = true;
  btn.textContent = '⏳ Laen...';
  btn.className = 'btn btn-sm btn-s';
  const updated = await fetchFromOpenfootball();
  // Mitu juba toimunud grupimängu on veel ilma tulemuseta (allikas pole avaldanud)?
  const now=new Date(),act=getActual();let missing=0;
  SCHEDULE.forEach(([grp,mi,dateUTC,timeUTC])=>{
    const end=new Date(`${dateUTC}T${timeUTC}:00Z`).getTime()+110*60000;
    if(now.getTime()>end&&!(act.results&&act.results[`${grp}_${mi}`]))missing++;
  });
  Object.keys(KO_SCHED).forEach(num=>{
    const [d,t]=KO_SCHED[num];const end=new Date(`${d}T${t}:00Z`).getTime()+130*60000;
    if(now.getTime()>end){const inf=KO_NUM[num];if(inf&&!koWinner(inf.key,inf.index,act))missing++;}
  });
  if (updated > 0) {
    btn.textContent = missing>0?`✓ ${updated} laaditud · ${missing} allikas puudu`:`✓ ${updated} uuendatud`;
    btn.className = 'btn btn-sm btn-s';
    if(missing>0)btn.title='Openfootball pole veel kõiki tulemusi avaldanud. Puuduvad saad sisestada käsitsi Tulemuste lehel.';
    setTimeout(()=>{ updateFetchBtn(); renderGroups(); if(document.getElementById('tab-schedule').classList.contains('active')) renderSchedule(); }, 1800);
  } else if (updated === 0) {
    btn.textContent = missing>0?`allikas puudu ${missing} mängu — sisesta käsitsi`:'— Ei leitud';
    btn.className = 'btn btn-sm btn-s';
    if(missing>0)btn.title='Openfootball pole neid tulemusi veel avaldanud. Sisesta puuduvad käsitsi Tulemuste lehel (skoorikastid).';
    setTimeout(updateFetchBtn, 2500);
  } else {
    btn.textContent = '❌ Ühendus ebaõnnestus';
    btn.className = 'btn btn-sm btn-s';
    setTimeout(updateFetchBtn, 2500);
  }
}
// ═══════ GITHUB ANDMETE AUTOMAATNE LAADIMINE ═══════
// Admin laeb data.json oma GitHubi repo'sse; äpp loeb selle igal avamisel.
// Andmed ei sõltu enam ühe brauseri localStorage'ist.
const GITHUB_DATA_URLS=[
  'https://raw.githubusercontent.com/kardokutan/MM2026-ennustus/main/data.json',
  'https://raw.githubusercontent.com/kardokutan/MM2026-ennustus/master/data.json',
];
async function loadFromGitHub(){
  let data=null;
  for(const url of GITHUB_DATA_URLS){
    try{
      const res=await fetch(url+'?t='+Date.now(),{cache:'no-store'});
      if(!res.ok)continue;
      const txt=await res.text();
      const parsed=JSON.parse(txt);
      if(parsed&&parsed.type==='wc2026_scores'){data=parsed;break;}
    }catch{continue;}
  }
  if(!data)return false; // GitHubis pole faili või ühendus ebaõnnestus — kasuta localStorage'i
  // Rakenda ainult kui GitHubi versioon on uuem (või esmakordne)
  const lastApplied=localStorage.getItem('wc2026_gh_ts')||'';
  const remoteTs=data.exported||'';
  const adminActive=isAdmin();
  // Admin muutmisrežiimis: ära kirjuta tema kohalikke muudatusi üle automaatselt
  if(adminActive)return false;
  if(remoteTs&&remoteTs===lastApplied)return false; // juba rakendatud, pole vaja midagi teha
  const s=getAll();
  (data.players||[]).forEach(n=>{if(!s.players.includes(n))s.players.push(n);});
  Object.entries(data.preds||{}).forEach(([n,p])=>{s.preds[n]=p;});
  if(data.actual)s.actual=data.actual;
  saveAll(s);
  localStorage.setItem('wc2026_gh_ts',remoteTs);
  setViewerMode(true); // teised näevad seisu kirjutuskaitstuna
  return true;
}
// ═══════ INIT ═══════
initTheme();
updateAdminSections();
migrateBracket(); // ametlik FIFA bracket: puhasta vana skeemi järgsed kehtetud play-off valikud
renderLogin();
// Proovi GitHubist värsket seisu laadida (ei blokeeri kuva)
loadFromGitHub().then(updated=>{if(updated){migrateBracket();renderLogin();}}).catch(()=>{});
</script>
